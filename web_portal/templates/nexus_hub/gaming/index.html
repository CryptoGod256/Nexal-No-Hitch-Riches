<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexal Gaming Subsystem</title>
    <style>
        body { background: #05050a; color: #22c55e; font-family: monospace; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .back-link { color: #22c55e; text-decoration: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .game-card { background: #09130d; border: 1px solid #15803d; padding: 15px; border-radius: 6px; }
        .btn { background: #16a34a; color: #000; border: none; padding: 8px 12px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="../portal.html" class="back-link">&larr; Back to Nexus Portal</a>
        <h1>Gaming & Simulation Engine</h1>
        <p>Autonomous state machines, micro-simulations, and game loop environments.</p>

        <div class="grid">
            <div class="game-card">
                <h3>Autonomous Agent Arena</h3>
                <p>Status: Active</p>
                <button class="btn">Launch Simulation</button>
            </div>
            <div class="game-card">
                <h3>State Logic Sandbox</h3>
                <p>Status: Standby</p>
                <button class="btn">Initialize Node</button>
            </div>
        </div>
    </div>
</body>
</html>
