<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexal Intelligence // Nexus Hub Directory</title>
    <style>
        :root { --bg-color: #0a0a0a; --card-bg: #141414; --accent-red: #ff1e38; --text-main: #f0f0f0; --text-muted: #888888; --border-color: #262626; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); line-height: 1.6; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        nav { margin-bottom: 30px; }
        nav a { color: var(--accent-red); text-decoration: none; font-weight: 600; font-size: 0.9rem; }
        header { text-align: center; padding: 30px 0; border-bottom: 1px solid var(--border-color); margin-bottom: 30px; }
        h1 { font-size: 2.2rem; font-weight: 800; color: #ffffff; margin-bottom: 10px; }
        h1 span { color: var(--accent-red); }
        p.subtitle { color: var(--text-muted); font-size: 1rem; }
        .portal-box { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .portal-box h3 { font-size: 1.2rem; color: #fff; margin-bottom: 10px; }
        .portal-box p { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <nav><a href="../index.html">← Back to Nexal Core</a></nav>
        <header>
            <h1>THE NEXUS <span>HUB</span></h1>
            <p class="subtitle">Multi-layered digital book architecture for AI automation workflows.</p>
        </header>
        <div class="portal-box">
            <h3>System Integration Node</h3>
            <p>The core hub for managing multi-page digital asset expansion and high-speed B2B modular data streams.</p>
        </div>
    </div>
</body>
</html>
