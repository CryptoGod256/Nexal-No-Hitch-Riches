<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexal Intelligence // Autonomous Ecosystem</title>
    <style>
        :root {
            --bg-obsidian: #0b0f19;
            --cyber-cyan: #00F2FE;
            --cyber-red: #FF2A5F;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: var(--bg-obsidian); color: var(--text-main); min-height: 100vh; }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .brand-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .brand-logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
        }
        .brand-title {
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--text-main), var(--cyber-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 2rem;
            font-size: 0.95rem;
            transition: color 0.2s;
        }
        nav a:hover {
            color: var(--cyber-cyan);
        }
        .hero {
            max-width: 1200px;
            margin: 6rem auto;
            padding: 0 2rem;
            text-align: center;
        }
        .hero h1 {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            font-weight: 900;
            letter-spacing: -1px;
        }
        .hero p {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto 2.5rem auto;
            line-height: 1.6;
        }
        .cta-btn {
            background: linear-gradient(135deg, var(--cyber-cyan), #4facfe);
            color: var(--bg-obsidian);
            padding: 0.85rem 2rem;
            font-weight: 700;
            border-radius: 6px;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(0, 242, 254, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }
        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 242, 254, 0.6);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-container">
            <img src="assets/logo.png" alt="Nexal Intelligence Logo" class="brand-logo">
            <div class="brand-title">NEXAL INTELLIGENCE</div>
        </div>
        <nav>
            <a href="#dashboard">Dashboard</a>
            <a href="#marketplace">Marketplace</a>
            <a href="#console">Console</a>
            <a href="#affiliates">Affiliates</a>
        </nav>
    </header>

    <main class="hero">
        <h1>Autonomous Intelligence Engine</h1>
        <p>Deploying high-performance software-as-a-service architectures, real-time data acquisition loops, and sovereign multi-stream economic pipelines.</p>
        <a href="#console" class="cta-btn">Initialize Operator Console</a>
    </main>

</body>
</html>
