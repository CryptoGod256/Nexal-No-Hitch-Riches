<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexal Intelligence // Autonomous Infrastructure</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #050814; color: #ffffff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero-section {
            background: linear-gradient(135deg, #050814 0%, #0b1329 100%);
            padding: 80px 20px;
            text-align: center;
            border-bottom: 2px solid #00ffcc;
        }
        .hero-container { max-width: 900px; margin: 0 auto; }
        .logo-container img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.25);
            border: 1px solid rgba(0, 255, 204, 0.3);
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 25px 0 15px 0;
            background: linear-gradient(90deg, #ffffff, #00ffcc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p { font-size: 1.25rem; color: #a0aec0; margin-bottom: 30px; }
        .cta-group { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .btn-primary {
            padding: 12px 25px;
            background: #00ffcc;
            color: #000;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            box-shadow: 0 4px 14px rgba(0, 255, 204, 0.4);
            transition: transform 0.2s;
        }
        .btn-secondary {
            padding: 12px 25px;
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            font-weight: bold;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .btn-primary:hover, .btn-secondary:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

    <!-- Nexal Intelligence Hero Branding -->
    <header class="hero-section">
        <div class="hero-container">
            <div class="logo-container">
                <!-- Drop your brand image into assets/images/nexal_hero.png -->
                <img src="assets/images/nexal_hero.png" alt="Nexal Intelligence Logo">
            </div>
            <h1>NEXAL INTELLIGENCE</h1>
            <p>Autonomous Infrastructure, Multi-Agent Routing & High-Speed B2B Automation</p>
            <div class="cta-group">
                <a href="#download-portal" class="btn-primary">Access Downloads</a>
                <a href="Goal.md" class="btn-secondary">View Roadmap</a>
            </div>
        </div>
    </header>

    <!-- Nexal Download Portal -->
    <section id="download-portal" style="padding: 60px 20px; background: #0a0a0a; text-align: center;">
        <h2>Nexal Intelligence // Secure Download Hub</h2>
        <p style="margin: 15px 0 25px 0; font-size: 1rem;">Access official documentation, audit logs, and deployment packages directly.</p>
        <a href="/downloads/nexal_core_package.zip" download class="btn-primary">Download Empire Package</a>
    </section>

</body>
</html>
